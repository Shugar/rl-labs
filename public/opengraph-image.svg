<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">RL Labs — Stop guessing. Start ranking up.</title>
  <desc id="description">RL Labs Rocket League coaching with the headline Stop guessing. Start ranking up. and Kinseh's coaching credentials.</desc>

  <style>
    @font-face {
      font-family: "RL Arena";
      src: url("/fonts/barlow-condensed-600.woff2") format("woff2");
      font-style: normal;
      font-weight: 600;
    }
    @font-face {
      font-family: "RL Sans";
      src: url("/fonts/manrope-variable.woff2") format("woff2");
      font-style: normal;
      font-weight: 200 800;
    }
    .arena { font-family: "RL Arena", "Arial Narrow", sans-serif; font-weight: 600; }
    .sans { font-family: "RL Sans", Arial, sans-serif; }
  </style>

  <defs>
    <radialGradient id="orangeGlow" cx="0" cy="0" r="1" gradientTransform="translate(100 580) rotate(-28) scale(720 430)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff5c24" stop-opacity="0.30" />
      <stop offset="0.48" stop-color="#ff5c24" stop-opacity="0.08" />
      <stop offset="1" stop-color="#ff5c24" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="blueGlow" cx="0" cy="0" r="1" gradientTransform="translate(1160 28) rotate(145) scale(690 450)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#52b8ff" stop-opacity="0.24" />
      <stop offset="0.5" stop-color="#52b8ff" stop-opacity="0.06" />
      <stop offset="1" stop-color="#52b8ff" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#f7f6f0" stroke-opacity="0.035" />
    </pattern>
  </defs>

  <!-- The palette is shared with the website tokens: ink, panel, white, orange, blue, and lime. -->
  <rect width="1200" height="630" fill="#07090f" />
  <rect width="1200" height="630" fill="url(#orangeGlow)" />
  <rect width="1200" height="630" fill="url(#blueGlow)" />
  <path d="M96 0H244L518 630H352Z" fill="#ff5c24" fill-opacity="0.035" />
  <path d="M489 0H604L719 630H568Z" fill="#f7f6f0" fill-opacity="0.018" />
  <path d="M940 0H1102L830 630H678Z" fill="#52b8ff" fill-opacity="0.035" />
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.42" />

  <!-- Brand: larger, cleaner, and free of the former stray dot. -->
  <g transform="translate(70 50)">
    <circle cx="18" cy="17" r="12" fill="none" stroke="#ff5c24" stroke-width="3.2" />
    <circle cx="18" cy="17" r="7" fill="none" stroke="#ff7a36" stroke-width="2.2" />
    <path d="M10 28L7 40L16 36L18 43L21 36L30 40L27 28" fill="none" stroke="#ff5c24" stroke-width="2.8" stroke-linejoin="round" />
    <text class="sans" x="48" y="34" fill="#f7f6f0" font-size="27" font-weight="800" letter-spacing="3.8">RL.LABS</text>
  </g>

  <!-- Primary message -->
  <g class="arena" font-size="132" letter-spacing="-2.7">
    <text x="67" y="235" fill="#f7f6f0">STOP GUESSING.</text>
    <text x="67" y="352" fill="#ff5c24">START RANKING UP.</text>
  </g>

  <text class="sans" x="71" y="407" fill="#f7f6f0" font-size="25" font-weight="470">
    <tspan x="71">Coaching built by a former pro who has reached SSL 25+ times—to make your</tspan>
    <tspan x="71" dy="37" fill="#9ca2af">decisions faster, your playstyle harder to read, and your climb repeatable.</tspan>
  </text>

  <!-- One editorial proof rail instead of three floating cards. -->
  <g transform="translate(0 492)">
    <rect width="1200" height="138" fill="#efeee8" />
    <rect width="1200" height="5" fill="#ff5c24" />

    <g transform="translate(70 0)">
      <text class="arena" x="0" y="91" fill="#07090f" font-size="78" letter-spacing="-1.2">25+</text>
      <text class="sans" x="143" y="67" fill="#07090f" font-size="19" font-weight="800" letter-spacing="1.5">TIMES AT</text>
      <text class="sans" x="143" y="94" fill="#07090f" fill-opacity="0.62" font-size="19" font-weight="760" letter-spacing="1.5">SSL</text>
    </g>

    <path d="M411 28V111" stroke="#07090f" stroke-opacity="0.17" />

    <g transform="translate(447 0)">
      <text class="arena" x="0" y="91" fill="#07090f" font-size="78" letter-spacing="-1.2">20K+</text>
      <text class="sans" x="172" y="67" fill="#07090f" font-size="19" font-weight="800" letter-spacing="1.35">HOURS</text>
      <text class="sans" x="172" y="94" fill="#07090f" fill-opacity="0.62" font-size="19" font-weight="760" letter-spacing="1.35">IN-GAME</text>
    </g>

    <path d="M793 28V111" stroke="#07090f" stroke-opacity="0.17" />

    <g transform="translate(830 0)">
      <text class="arena" x="0" y="91" fill="#07090f" font-size="78" letter-spacing="-1.2">10+</text>
      <text class="sans" x="132" y="67" fill="#07090f" font-size="19" font-weight="800" letter-spacing="1.35">YEARS</text>
      <text class="sans" x="132" y="94" fill="#07090f" fill-opacity="0.62" font-size="19" font-weight="760" letter-spacing="1.35">COMPETING</text>
    </g>
  </g>

  <rect x="0.5" y="0.5" width="1199" height="629" fill="none" stroke="#f7f6f0" stroke-opacity="0.08" />
</svg>
